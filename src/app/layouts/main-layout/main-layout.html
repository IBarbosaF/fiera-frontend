<!-- ============================================================
     MainLayout — Con sesión activa
     Header + partículas + contenido de la página
============================================================ -->
<app-particles />

<!-- Header: solo visible con sesión activa -->
@if (auth.estaLogueado()) {
  <app-header />
}

<main class="main-content"
    [class.sin-header]="!auth.estaLogueado()"
    [style.overflow]="auth.estaLogueado() ? 'hidden' : 'auto'">
  <router-outlet />
</main>
