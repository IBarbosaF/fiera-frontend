<app-particles />

@if (auth.estaLogueado()) {
  <div class="layout-con-sesion">
    <app-header />
    <main class="main-content">
      @if (mostrarLeona()) {
        <div class="layout-fiera-bg">
          <div class="layout-fiera-ring"></div>
          <img src="assets/fieraLogo.png" alt="" class="layout-fiera-img" aria-hidden="true" />
        </div>
      }
      <router-outlet />
    </main>
  </div>
} @else {
  <main class="main-content sin-sesion">
    <router-outlet />
  </main>
}
